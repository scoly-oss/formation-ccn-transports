<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect rx='8' width='32' height='32' fill='%23e8842c'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='central' font-size='18' font-weight='800' fill='white'>T</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e2d3d" />
    <title>Formation CCN Transports Routiers — Sofiane Coly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --orange: #e8842c;
        --orange-light: #F5A623;
        --navy: #1e2d3d;
        --navy-light: #2a3f52;
        --cream: #faf8f5;
        --white: #ffffff;
        --text-secondary: #5a6a7a;
        --text-light: #8a96a3;
        --border: rgba(30, 45, 61, 0.08);
        --shadow-sm: 0 1px 3px rgba(30, 45, 61, 0.06);
        --shadow-md: 0 4px 20px rgba(30, 45, 61, 0.08);
        --shadow-lg: 0 8px 40px rgba(30, 45, 61, 0.12);
        --shadow-orange: 0 4px 20px rgba(232, 132, 44, 0.25);
        --gradient-orange: linear-gradient(135deg, #e8842c 0%, #F5A623 100%);
        --radius-sm: 12px;
        --radius-md: 16px;
        --radius-lg: 20px;
        --radius-xl: 24px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--cream);
        color: var(--navy);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      a { text-decoration: none; color: inherit; }
      button { font-family: inherit; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(30,45,61,0.15); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(30,45,61,0.25); }

      /* Content body styles */
      .content-body p { margin-bottom: 16px; }
      .content-body strong { color: var(--navy); font-weight: 700; }
      .content-body table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin: 20px 0;
        font-size: 14px;
        border-radius: var(--radius-sm);
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .content-body table th,
      .content-body table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }
      .content-body table th {
        background: var(--navy);
        font-weight: 600;
        color: #fff;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .content-body table tr:last-child td { border-bottom: none; }
      .content-body table tr:nth-child(even) td { background: rgba(30,45,61,0.02); }
      .content-body table tr:hover td { background: rgba(232,132,44,0.04); }

      /* SPA redirect */
      script { display: none; }

      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }

      /* Print styles for PDF export */
      @media print {
        body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        nav, button, .pomodoro-timer { display: none !important; }
        main { margin-left: 0 !important; }
        [style*="marginLeft: 280"] { margin-left: 0 !important; }
        #root > div > div:first-child > nav { display: none !important; }
        #root > div > div:first-child { display: block !important; }
        #root > div > main { margin-left: 0 !important; }
        @page { margin: 1cm; size: A4 landscape; }
      }
    </style>
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
